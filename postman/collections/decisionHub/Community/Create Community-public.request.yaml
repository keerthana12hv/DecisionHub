  type: json
  content: "{\r

    \  \"name\": \"Javadev\",\r

    \  \"slug\": \"javadev\",\r

    \  \"description\": \"Community for Java Developers\",\r

    \  \"categoryId\": 1,\r

    \  \"visibility\": \"PUBLIC\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
order: 3000
